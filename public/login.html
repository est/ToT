<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Tree of Threads</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1 class="login-title">🌲 Tree of Threads 🪡</h1>
      <p class="login-sub">Passkey 登录</p>

      <div id="step-default">
        <div class="login-actions">
          <button id="btn-register" class="btn-secondary">注册</button>
          <button id="btn-login" class="btn-primary">登录</button>
        </div>
        <div class="login-links">
          <a href="#" id="link-recover">找回账号</a>
          <a href="#" id="link-other-login">其他登录</a>
        </div>
      </div>

      <div id="step-email" style="display:none">
        <label class="login-label">邮箱</label>
        <input type="email" id="email" placeholder="you@example.com" autofocus>
        <div class="login-actions">
          <button id="btn-back" class="btn-secondary">返回</button>
          <button id="btn-register-confirm" class="btn-primary">注册</button>
        </div>
      </div>

      <div id="step-status" style="display:none">
        <p id="status-text" class="login-status"></p>
        <button id="btn-retry" class="btn-secondary" style="display:none">重试</button>
      </div>
    </div>
  </div>

  <script type="module" src="/login.js"></script>
</body>
</html>
